name: PHP Tests
on: [push, pull_request, workflow_dispatch]

jobs:
  php-tests:
    uses: lunr-php/actions-templates/.github/workflows/php-library.yml@53e01c4c30d98b283a227f33c2312afa1eada96c # 0.14.3
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    with:
      coding-standard: 'Lunr'
      minimum-php-version: '8.3'
      php-extensions: uuid
      stable-php-versions: '["8.3"]'
      experimental-php-versions: '["8.4","8.5"]'
